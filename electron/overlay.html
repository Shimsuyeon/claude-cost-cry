<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: transparent;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-app-region: drag;
  }

  .widget {
    width: 260px;
    margin: 10px;
    background: rgba(20, 20, 28, 0.88);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 14px 16px;
    transition: background 0.3s ease, border-color 0.3s ease;
    overflow: hidden;
    position: relative;
  }

  .widget::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .widget.pulse::before { animation: pulse-glow 0.6s ease-out; }

  @keyframes pulse-glow {
    0% { opacity: 1; box-shadow: inset 0 0 20px rgba(255, 180, 50, 0.3); }
    100% { opacity: 0; }
  }

  .widget.tier-peace { border-color: rgba(100, 200, 100, 0.2); }
  .widget.tier-uneasy { border-color: rgba(255, 200, 50, 0.25); }
  .widget.tier-worry { border-color: rgba(255, 140, 30, 0.3); }
  .widget.tier-alert { border-color: rgba(255, 60, 60, 0.35); }
  .widget.tier-danger { border-color: rgba(200, 30, 30, 0.4); }
  .widget.tier-funeral { border-color: rgba(120, 50, 180, 0.4); }

  .main-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .emoji-container {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .emoji-container.bounce { animation: emoji-bounce 0.5s ease; }

  @keyframes emoji-bounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.4); }
    50% { transform: scale(0.9); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .info { flex: 1; min-width: 0; }

  .cost-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .cost {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    transition: color 0.3s ease;
  }

  .delta {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 120, 80, 0.9);
    opacity: 0;
  }

  .delta.show { animation: delta-flash 2s ease-out forwards; }

  @keyframes delta-flash {
    0% { opacity: 1; transform: translateY(0); }
    70% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-4px); }
  }

  .equiv {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 1px;
  }

  .calls {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 1px;
  }

  /* Toolbar buttons */
  .toolbar {
    position: absolute;
    top: 10px;
    right: 12px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .tool-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.25);
    cursor: pointer;
    border-radius: 50%;
    transition: color 0.2s, background 0.2s;
    -webkit-app-region: no-drag;
  }

  .tool-btn:hover {
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.08);
  }

  .tool-btn.active {
    color: rgba(100, 200, 255, 0.9);
    background: rgba(100, 200, 255, 0.12);
  }

  /* Budget bar */
  .budget-section {
    margin-top: 8px;
    display: none;
  }

  .budget-section.visible { display: block; }

  .budget-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .budget-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background 0.3s ease;
    width: 0%;
    background: #8be88b;
  }

  .budget-bar-fill.warning { background: #ffd966; }
  .budget-bar-fill.danger { background: #ff5555; }
  .budget-bar-fill.exceeded { background: #ff2222; }

  .budget-label {
    display: flex;
    justify-content: space-between;
    margin-top: 3px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
  }

  /* Nudge */
  .nudge {
    margin-top: 6px;
    font-size: 10px;
    color: rgba(100, 200, 255, 0.7);
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nudge.show { animation: nudge-fade 3s ease-out forwards; }

  @keyframes nudge-fade {
    0% { opacity: 1; }
    70% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Tier cost colors */
  .tier-peace .cost { color: #8be88b; }
  .tier-uneasy .cost { color: #ffd966; }
  .tier-worry .cost { color: #ff9944; }
  .tier-alert .cost { color: #ff5555; }
  .tier-danger .cost { color: #ff2222; }
  .tier-funeral .cost { color: #bb66ff; }

  .widget.shake { animation: widget-shake 0.4s ease; }

  @keyframes widget-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  /* ── Expandable panels (shared) ── */
  .panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, margin-top 0.3s ease, opacity 0.25s ease;
    opacity: 0;
    -webkit-app-region: no-drag;
  }

  .panel.open {
    margin-top: 12px;
    opacity: 1;
  }

  .panel-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin-bottom: 10px;
  }

  /* ── Settings panel ── */
  .settings-panel.open { max-height: 280px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .setting-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
  }

  .setting-input {
    width: 80px;
    height: 26px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 12px;
    padding: 0 8px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .setting-input:focus { border-color: rgba(100, 200, 255, 0.4); }
  .setting-input::placeholder { color: rgba(255, 255, 255, 0.2); }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: rgba(100, 200, 255, 0.5); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  .save-btn {
    width: 100%;
    height: 28px;
    background: rgba(100, 200, 255, 0.15);
    border: 1px solid rgba(100, 200, 255, 0.25);
    border-radius: 8px;
    color: rgba(100, 200, 255, 0.9);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
    margin-top: 2px;
  }

  .save-btn:hover { background: rgba(100, 200, 255, 0.25); }
  .save-btn:active { transform: scale(0.97); }

  .setting-select {
    width: 110px;
    height: 26px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 11px;
    padding: 0 6px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .setting-select option {
    background: #1a1a24;
    color: #fff;
  }

  .save-btn.saved {
    background: rgba(100, 200, 100, 0.2);
    border-color: rgba(100, 200, 100, 0.3);
    color: rgba(100, 200, 100, 0.9);
  }

  .exchange-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 6px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.35);
  }

  .exchange-rate-value {
    color: rgba(100, 200, 255, 0.7);
    font-weight: 600;
    font-size: 10px;
  }

  .exchange-source {
    font-size: 8px;
    color: rgba(255, 255, 255, 0.2);
  }

  /* ── TOP 3 panel ── */
  .top-panel.open { max-height: 220px; }

  .top-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
  }

  .top-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .top-medal {
    font-size: 14px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .top-cost {
    font-size: 13px;
    font-weight: 700;
    color: #ffd966;
    min-width: 52px;
  }

  .top-model {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .top-model.opus { background: rgba(180, 100, 255, 0.2); color: rgba(200, 140, 255, 0.9); }
  .top-model.sonnet { background: rgba(80, 140, 255, 0.2); color: rgba(120, 170, 255, 0.9); }
  .top-model.haiku { background: rgba(80, 200, 120, 0.2); color: rgba(120, 220, 150, 0.9); }
  .top-model.openai { background: rgba(116, 170, 156, 0.2); color: rgba(116, 200, 156, 0.9); }
  .top-model.google { background: rgba(66, 133, 244, 0.2); color: rgba(100, 160, 244, 0.9); }

  .top-time {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.25);
    margin-left: auto;
  }

  .top-prompt {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    margin-left: 28px;
    margin-top: -2px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .top-empty {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    text-align: center;
    padding: 12px 0;
  }

  /* ── Chart panel ── */
  .chart-panel.open { max-height: 260px; }

  .chart-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }

  .chart-date {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .chart-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    min-width: 0;
  }

  .chart-bar-fill.low { background: #8be88b; }
  .chart-bar-fill.mid { background: #ffd966; }
  .chart-bar-fill.high { background: #ff5555; }

  .chart-cost {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .chart-stats {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .chart-stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 2px;
  }

  .chart-stat-label { color: rgba(255, 255, 255, 0.4); }
  .chart-stat-value { color: rgba(255, 255, 255, 0.7); font-weight: 600; }
</style>
</head>
<body>

<div class="widget tier-peace" id="widget">
  <div class="toolbar">
    <div class="tool-btn" id="chartBtn" title="주간 리포트">📊</div>
    <div class="tool-btn" id="topBtn" title="비싼 요청 TOP 3">🏆</div>
    <div class="tool-btn" id="gearBtn" title="설정">⚙</div>
  </div>

  <div class="main-row">
    <div class="emoji-container" id="emoji">🪙</div>
    <div class="info">
      <div class="cost-line">
        <span class="cost" id="cost">$0.00</span>
        <span class="delta" id="delta"></span>
      </div>
      <div class="equiv" id="equiv">지갑이 평화롭습니다</div>
      <div class="calls" id="calls"></div>
    </div>
  </div>

  <div class="budget-section" id="budgetSection">
    <div class="budget-bar-bg">
      <div class="budget-bar-fill" id="budgetFill"></div>
    </div>
    <div class="budget-label">
      <span id="budgetUsed">$0</span>
      <span id="budgetTotal">$0</span>
    </div>
  </div>

  <div class="nudge" id="nudge"></div>

  <!-- Chart Panel -->
  <div class="panel chart-panel" id="chartPanel">
    <div class="panel-divider"></div>
    <div class="chart-panel-title">📊 주간 비용 추이</div>
    <div id="chartBody"></div>
  </div>

  <!-- TOP 3 Panel -->
  <div class="panel top-panel" id="topPanel">
    <div class="panel-divider"></div>
    <div class="top-panel-title">🏆 오늘의 가장 비싼 요청</div>
    <div id="topList"></div>
  </div>

  <!-- Settings Panel -->
  <div class="panel settings-panel" id="settingsPanel">
    <div class="panel-divider"></div>

    <div class="exchange-info" id="exchangeInfo" style="display:none">
      <span>💱 <span id="exchangeRateDisplay"></span></span>
      <span class="exchange-source" id="exchangeSource"></span>
    </div>

    <div class="setting-row">
      <span class="setting-label">통화</span>
      <select class="setting-select" id="currencySelect" style="width:80px">
        <option value="USD">$ USD</option>
      </select>
    </div>

    <div class="setting-row">
      <span class="setting-label">일일 예산</span>
      <input type="text" class="setting-input" id="budgetInput" placeholder="미설정">
    </div>

    <div class="setting-row">
      <span class="setting-label">환산 단위</span>
      <select class="setting-select" id="unitSelect">
        <option value="auto">🔄 자동</option>
      </select>
    </div>

    <div class="setting-row">
      <span class="setting-label">절약 넛지</span>
      <label class="toggle">
        <input type="checkbox" id="nudgeToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <button class="save-btn" id="saveBtn">저장</button>
  </div>
</div>

<script>
  const widget = document.getElementById('widget');
  const emojiEl = document.getElementById('emoji');
  const costEl = document.getElementById('cost');
  const deltaEl = document.getElementById('delta');
  const equivEl = document.getElementById('equiv');
  const callsEl = document.getElementById('calls');
  const budgetSection = document.getElementById('budgetSection');
  const budgetFill = document.getElementById('budgetFill');
  const budgetUsed = document.getElementById('budgetUsed');
  const budgetTotal = document.getElementById('budgetTotal');
  const nudgeEl = document.getElementById('nudge');
  const gearBtn = document.getElementById('gearBtn');
  const topBtn = document.getElementById('topBtn');
  const chartBtn = document.getElementById('chartBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const topPanel = document.getElementById('topPanel');
  const chartPanel = document.getElementById('chartPanel');
  const chartBody = document.getElementById('chartBody');
  const topList = document.getElementById('topList');
  const budgetInput = document.getElementById('budgetInput');
  const unitSelect = document.getElementById('unitSelect');
  const currencySelect = document.getElementById('currencySelect');
  const nudgeToggle = document.getElementById('nudgeToggle');
  const saveBtn = document.getElementById('saveBtn');
  const exchangeInfoEl = document.getElementById('exchangeInfo');
  const exchangeRateDisplay = document.getElementById('exchangeRateDisplay');
  const exchangeSource = document.getElementById('exchangeSource');

  let activePanel = null;
  let latestData = {};
  let currentExchange = null;

  function formatCostUsd(cost) {
    if (cost < 0.01) return `$${cost.toFixed(4)}`;
    if (cost < 1) return `$${cost.toFixed(3)}`;
    return `$${cost.toFixed(2)}`;
  }

  function formatCost(cost) {
    const ex = currentExchange;
    if (!ex || ex.currency === 'USD') return formatCostUsd(cost);

    const local = cost * ex.rate;
    const sym = ex.symbol;

    if (ex.currency === 'KRW' || ex.currency === 'JPY') {
      return `${sym}${Math.round(local).toLocaleString()}`;
    }
    return `${sym}${local.toFixed(2)}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTokens(n) {
    if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
    if (n >= 1_000) return `${(n / 1_000).toFixed(1)}K`;
    return String(n);
  }

  // ── Panel toggle ──

  function closeAllPanels() {
    settingsPanel.classList.remove('open');
    topPanel.classList.remove('open');
    chartPanel.classList.remove('open');
    gearBtn.classList.remove('active');
    topBtn.classList.remove('active');
    chartBtn.classList.remove('active');
    activePanel = null;
    window.bridge.resizeWidget(false);
  }

  function openPanel(name) {
    closeAllPanels();
    activePanel = name;

    if (name === 'settings') {
      settingsPanel.classList.add('open');
      gearBtn.classList.add('active');
    } else if (name === 'top') {
      topPanel.classList.add('open');
      topBtn.classList.add('active');
      renderTopList();
    } else if (name === 'chart') {
      chartPanel.classList.add('open');
      chartBtn.classList.add('active');
      loadChart();
    }

    window.bridge.resizeWidget(true);
  }

  gearBtn.addEventListener('click', async () => {
    if (activePanel === 'settings') {
      closeAllPanels();
      return;
    }
    const cfg = await window.bridge.getConfig();
    budgetInput.value = cfg.dailyBudget || '';
    nudgeToggle.checked = cfg.showNudge !== false;

    unitSelect.innerHTML = '<option value="auto">🔄 자동</option>';
    if (cfg.allUnits) {
      for (const u of cfg.allUnits) {
        const opt = document.createElement('option');
        opt.value = u.name;
        opt.textContent = `${u.emoji} ${u.name}`;
        unitSelect.appendChild(opt);
      }
    }
    unitSelect.value = cfg.equivalentUnit || 'auto';

    const CURRENCY_LABELS = { USD: '$ USD', KRW: '₩ KRW', JPY: '¥ JPY', EUR: '€ EUR', GBP: '£ GBP', CNY: '¥ CNY' };
    currencySelect.innerHTML = '';
    const currencies = cfg.supportedCurrencies || ['USD'];
    for (const c of currencies) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = CURRENCY_LABELS[c] || c;
      currencySelect.appendChild(opt);
    }
    currencySelect.value = cfg.currency || 'USD';

    if (cfg.currentExchange && cfg.currentExchange.currency !== 'USD') {
      exchangeInfoEl.style.display = 'flex';
      exchangeRateDisplay.textContent = `1 USD = ${cfg.currentExchange.rate.toLocaleString()} ${cfg.currentExchange.currency}`;
      const srcMap = { api: '실시간', cache: '캐시', 'stale-cache': '오래된 캐시', manual: '수동 설정' };
      exchangeSource.textContent = `${srcMap[cfg.currentExchange.source] || ''} ${cfg.currentExchange.updatedAt || ''}`.trim();
    } else {
      exchangeInfoEl.style.display = 'none';
    }

    saveBtn.textContent = '저장';
    saveBtn.classList.remove('saved');
    openPanel('settings');
  });

  chartBtn.addEventListener('click', () => {
    if (activePanel === 'chart') {
      closeAllPanels();
      return;
    }
    openPanel('chart');
  });

  topBtn.addEventListener('click', () => {
    if (activePanel === 'top') {
      closeAllPanels();
      return;
    }
    openPanel('top');
  });

  // ── TOP 3 rendering ──

  function renderTopList() {
    const items = latestData.topRequests || [];
    if (items.length === 0) {
      topList.innerHTML = '<div class="top-empty">아직 요청이 없습니다</div>';
      return;
    }

    const medals = ['🥇', '🥈', '🥉'];
    topList.innerHTML = items.map((req, i) => {
      const modelKey = req.model.toLowerCase();
      const modelClass = /opus/i.test(modelKey) ? 'opus' : /haiku/i.test(modelKey) ? 'haiku'
        : /gpt|o[1-4]/i.test(modelKey) ? 'openai' : /gemini/i.test(modelKey) ? 'google' : 'sonnet';
      const pEmoji = req.providerEmoji ? `<span style="font-size:10px">${req.providerEmoji}</span> ` : '';
      const promptHtml = req.prompt
        ? `<div class="top-prompt">💬 ${escapeHtml(req.prompt)}</div>`
        : '';
      return `
        <div class="top-item">
          <span class="top-medal">${medals[i]}</span>
          <span class="top-cost">${formatCost(req.cost)}</span>
          <span class="top-model ${modelClass}">${pEmoji}${req.model}</span>
          <span class="top-time">${req.time || ''}</span>
        </div>
        ${promptHtml}
      `;
    }).join('');
  }

  // ── Chart ──

  async function loadChart() {
    chartBody.innerHTML = '<div class="top-empty">로딩 중...</div>';
    const report = await window.bridge.getReport(7);

    if (!report.dailyData || report.dailyData.length === 0) {
      chartBody.innerHTML = '<div class="top-empty">데이터가 없습니다</div>';
      return;
    }

    const maxCost = Math.max(...report.dailyData.map(d => d.cost), 0.01);

    let html = report.dailyData.map(d => {
      const pct = Math.round((d.cost / maxCost) * 100);
      const barClass = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
      const costStr = d.cost > 0 ? formatCost(d.cost) : '·';
      return `
        <div class="chart-row">
          <span class="chart-date">${d.date} ${d.day}</span>
          <div class="chart-bar-bg">
            <div class="chart-bar-fill ${barClass}" style="width:${pct}%"></div>
          </div>
          <span class="chart-cost">${costStr}</span>
        </div>
      `;
    }).join('');

    if (report.stats) {
      html += `
        <div class="chart-stats">
          <div class="chart-stat-row">
            <span class="chart-stat-label">총 비용</span>
            <span class="chart-stat-value">${formatCost(report.stats.totalCost)}</span>
          </div>
          <div class="chart-stat-row">
            <span class="chart-stat-label">일 평균</span>
            <span class="chart-stat-value">${formatCost(report.stats.avgDaily)}</span>
          </div>
          <div class="chart-stat-row">
            <span class="chart-stat-label">총 호출</span>
            <span class="chart-stat-value">${report.stats.totalCalls}건</span>
          </div>
        </div>
      `;
    }

    chartBody.innerHTML = html;
  }

  // ── Settings save ──

  saveBtn.addEventListener('click', async () => {
    const budgetVal = budgetInput.value.trim();
    const updates = {
      dailyBudget: budgetVal === '' ? null : parseFloat(budgetVal),
      showNudge: nudgeToggle.checked,
      equivalentUnit: unitSelect.value,
      currency: currencySelect.value,
    };

    if (updates.dailyBudget !== null && isNaN(updates.dailyBudget)) {
      budgetInput.style.borderColor = 'rgba(255, 80, 80, 0.6)';
      setTimeout(() => { budgetInput.style.borderColor = ''; }, 1500);
      return;
    }

    await window.bridge.saveConfig(updates);

    saveBtn.textContent = '✓ 저장됨';
    saveBtn.classList.add('saved');
    setTimeout(() => {
      saveBtn.textContent = '저장';
      saveBtn.classList.remove('saved');
    }, 1500);
  });

  // ── Display ──

  function updateDisplay(data) {
    latestData = data;
    if (data.exchange) currentExchange = data.exchange;

    widget.className = 'widget';
    if (data.tier) widget.classList.add(`tier-${data.tier.level}`);

    if (activePanel === 'settings') gearBtn.classList.add('active');
    if (activePanel === 'top') topBtn.classList.add('active');
    if (activePanel === 'chart') chartBtn.classList.add('active');

    if (data.tier) emojiEl.textContent = data.tier.emoji;
    costEl.textContent = formatCost(data.totalCost);

    if (data.equivalent) {
      equivEl.textContent = `${data.equivalent.emoji} ${data.equivalent.name} ${data.equivalent.count}${data.equivalent.unit || '개'}`;
    } else if (data.totalCost === 0) {
      equivEl.textContent = '지갑이 평화롭습니다';
    } else {
      equivEl.textContent = '아직은 괜찮아...';
    }

    if (data.callCount > 0) {
      const providerBreakdown = data.costByProvider && Object.keys(data.costByProvider).length > 1
        ? ' (' + Object.entries(data.costByProvider)
            .sort((a, b) => b[1] - a[1])
            .map(([p, c]) => {
              const meta = { claude: '🟣', openai: '🟢', google: '🔵' };
              return `${meta[p] || ''}${formatCost(c)}`;
            }).join(' ') + ')'
        : '';
      callsEl.textContent = `오늘 ${data.callCount}건${providerBreakdown}`;
    }

    if (data.budget) {
      budgetSection.classList.add('visible');
      const pct = Math.round(data.budget.ratio * 100);
      budgetFill.style.width = `${pct}%`;
      budgetFill.className = 'budget-bar-fill';
      if (data.budget.status === 'exceeded') budgetFill.classList.add('exceeded');
      else if (data.budget.status === 'danger') budgetFill.classList.add('danger');
      else if (data.budget.status === 'warning') budgetFill.classList.add('warning');
      budgetUsed.textContent = formatCost(data.totalCost);
      budgetTotal.textContent = formatCost(data.budget.budget);
    } else {
      budgetSection.classList.remove('visible');
    }

    if (activePanel === 'top') renderTopList();
  }

  function animateUpdate(data) {
    emojiEl.classList.remove('bounce');
    void emojiEl.offsetWidth;
    emojiEl.classList.add('bounce');

    widget.classList.remove('pulse');
    void widget.offsetWidth;
    widget.classList.add('pulse');

    if (data.tier && ['alert', 'danger', 'funeral'].includes(data.tier.level)) {
      widget.classList.remove('shake');
      void widget.offsetWidth;
      widget.classList.add('shake');
    }

    if (data.deltaCost) {
      deltaEl.textContent = `+${formatCost(data.deltaCost)}`;
      deltaEl.classList.remove('show');
      void deltaEl.offsetWidth;
      deltaEl.classList.add('show');
    }

    if (data.nudge) {
      nudgeEl.textContent = `💡 ${data.nudge.model}로 했으면 ${formatCost(data.nudge.saving)} 절약`;
      nudgeEl.classList.remove('show');
      void nudgeEl.offsetWidth;
      nudgeEl.classList.add('show');
    }
  }

  window.bridge.onInitialData((data) => updateDisplay(data));
  window.bridge.onCostUpdate((data) => {
    updateDisplay(data);
    animateUpdate(data);
  });
</script>

</body>
</html>

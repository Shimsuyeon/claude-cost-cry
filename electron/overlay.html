<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: transparent;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-app-region: drag;
  }

  .widget {
    width: 260px;
    margin: 10px;
    background: rgba(20, 20, 28, 0.88);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 14px 16px;
    transition: background 0.3s ease, border-color 0.3s ease;
    overflow: hidden;
    position: relative;
  }

  .widget::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .widget.pulse::before { animation: pulse-glow 0.6s ease-out; }

  @keyframes pulse-glow {
    0% { opacity: 1; box-shadow: inset 0 0 20px rgba(255, 180, 50, 0.3); }
    100% { opacity: 0; }
  }

  .widget.tier-peace { border-color: rgba(100, 200, 100, 0.2); }
  .widget.tier-uneasy { border-color: rgba(255, 200, 50, 0.25); }
  .widget.tier-worry { border-color: rgba(255, 140, 30, 0.3); }
  .widget.tier-alert { border-color: rgba(255, 60, 60, 0.35); }
  .widget.tier-danger { border-color: rgba(200, 30, 30, 0.4); }
  .widget.tier-funeral { border-color: rgba(120, 50, 180, 0.4); }

  .main-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .emoji-container {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .emoji-container.bounce { animation: emoji-bounce 0.5s ease; }

  @keyframes emoji-bounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.4); }
    50% { transform: scale(0.9); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .info { flex: 1; min-width: 0; }

  .cost-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .cost {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    transition: color 0.3s ease;
  }

  .delta {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 120, 80, 0.9);
    opacity: 0;
  }

  .delta.show { animation: delta-flash 2s ease-out forwards; }

  @keyframes delta-flash {
    0% { opacity: 1; transform: translateY(0); }
    70% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-4px); }
  }

  .equiv {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 1px;
  }

  .calls {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 1px;
  }

  /* Toolbar buttons */
  .toolbar {
    position: absolute;
    top: 10px;
    right: 12px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .tool-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.25);
    cursor: pointer;
    border-radius: 50%;
    transition: color 0.2s, background 0.2s;
    -webkit-app-region: no-drag;
  }

  .tool-btn:hover {
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.08);
  }

  .tool-btn.active {
    color: rgba(100, 200, 255, 0.9);
    background: rgba(100, 200, 255, 0.12);
  }

  /* Budget bar */
  .budget-section {
    margin-top: 8px;
    display: none;
  }

  .budget-section.visible { display: block; }

  .budget-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .budget-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background 0.3s ease;
    width: 0%;
    background: #8be88b;
  }

  .budget-bar-fill.warning { background: #ffd966; }
  .budget-bar-fill.danger { background: #ff5555; }
  .budget-bar-fill.exceeded { background: #ff2222; }

  .budget-label {
    display: flex;
    justify-content: space-between;
    margin-top: 3px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
  }

  /* Nudge */
  .nudge {
    margin-top: 6px;
    font-size: 10px;
    color: rgba(100, 200, 255, 0.7);
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nudge.show { animation: nudge-fade 3s ease-out forwards; }

  @keyframes nudge-fade {
    0% { opacity: 1; }
    70% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Tier cost colors */
  .tier-peace .cost { color: #8be88b; }
  .tier-uneasy .cost { color: #ffd966; }
  .tier-worry .cost { color: #ff9944; }
  .tier-alert .cost { color: #ff5555; }
  .tier-danger .cost { color: #ff2222; }
  .tier-funeral .cost { color: #bb66ff; }

  .widget.shake { animation: widget-shake 0.4s ease; }

  @keyframes widget-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  /* ── Expandable panels (shared) ── */
  .panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, margin-top 0.3s ease, opacity 0.25s ease;
    opacity: 0;
    -webkit-app-region: no-drag;
  }

  .panel.open {
    margin-top: 12px;
    opacity: 1;
  }

  .panel-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin-bottom: 10px;
  }

  /* ── Settings panel ── */
  .settings-panel.open { max-height: 420px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .setting-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
  }

  .setting-input {
    width: 80px;
    height: 26px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 12px;
    padding: 0 8px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .setting-input:focus { border-color: rgba(100, 200, 255, 0.4); }
  .setting-input::placeholder { color: rgba(255, 255, 255, 0.2); }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: rgba(100, 200, 255, 0.5); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  .save-btn {
    width: 100%;
    height: 28px;
    background: rgba(100, 200, 255, 0.15);
    border: 1px solid rgba(100, 200, 255, 0.25);
    border-radius: 8px;
    color: rgba(100, 200, 255, 0.9);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
    margin-top: 2px;
  }

  .save-btn:hover { background: rgba(100, 200, 255, 0.25); }
  .save-btn:active { transform: scale(0.97); }

  .setting-select {
    width: 110px;
    height: 26px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 11px;
    padding: 0 6px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .setting-select option {
    background: #1a1a24;
    color: #fff;
  }

  .save-btn.saved {
    background: rgba(100, 200, 100, 0.2);
    border-color: rgba(100, 200, 100, 0.3);
    color: rgba(100, 200, 100, 0.9);
  }

  .exchange-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 6px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.35);
  }

  .exchange-rate-value {
    color: rgba(100, 200, 255, 0.7);
    font-weight: 600;
    font-size: 10px;
  }

  .exchange-source {
    font-size: 8px;
    color: rgba(255, 255, 255, 0.2);
  }

  /* ── TOP 3 panel ── */
  .top-panel.open { max-height: 320px; }

  .top-summary {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 8px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    text-align: center;
  }

  .top-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
  }

  .top-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .top-medal {
    font-size: 14px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .top-cost {
    font-size: 13px;
    font-weight: 700;
    color: #ffd966;
    min-width: 52px;
  }

  .top-model {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .top-model.opus { background: rgba(180, 100, 255, 0.2); color: rgba(200, 140, 255, 0.9); }
  .top-model.sonnet { background: rgba(80, 140, 255, 0.2); color: rgba(120, 170, 255, 0.9); }
  .top-model.haiku { background: rgba(80, 200, 120, 0.2); color: rgba(120, 220, 150, 0.9); }
  .top-model.openai { background: rgba(116, 170, 156, 0.2); color: rgba(116, 200, 156, 0.9); }
  .top-model.google { background: rgba(66, 133, 244, 0.2); color: rgba(100, 160, 244, 0.9); }
  .top-model.cursor { background: rgba(6, 182, 212, 0.2); color: rgba(80, 210, 230, 0.9); }

  .top-time {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.25);
    margin-left: auto;
  }

  .top-prompt {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    margin-left: 28px;
    margin-top: -2px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }

  .top-prompt:hover { color: rgba(255, 255, 255, 0.6); }

  .top-prompt.expanded {
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
  }

  .top-tokens {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    margin-left: 28px;
    margin-bottom: 4px;
    display: flex;
    gap: 8px;
  }

  .top-tokens .tok-in { color: rgba(100, 200, 255, 0.5); }
  .top-tokens .tok-out { color: rgba(255, 180, 100, 0.5); }

  .cost-split {
    font-size: 9px;
    margin-left: 28px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .cost-split .split-label {
    font-weight: 500;
    flex-shrink: 0;
  }

  .cost-split .split-label.label-in { color: rgba(100, 200, 255, 0.6); }
  .cost-split .split-label.label-out { color: rgba(255, 180, 100, 0.6); }

  .cost-split .split-value {
    font-weight: 700;
  }

  .cost-split .split-value.val-in { color: rgba(100, 200, 255, 0.85); }
  .cost-split .split-value.val-out { color: rgba(255, 180, 100, 0.85); }

  .cost-split .split-pct {
    color: rgba(255, 255, 255, 0.3);
    font-weight: 400;
  }


  .top-empty {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    text-align: center;
    padding: 12px 0;
  }

  /* ── Models panel ── */
  .models-panel.open { max-height: 220px; }
  .models-panel .chart-panel-title { margin-bottom: 6px; }

  /* ── Chart panel ── */
  .chart-panel.open { max-height: 320px; }

  .chart-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }

  .chart-date {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .chart-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    min-width: 0;
  }

  .chart-bar-fill.low { background: #8be88b; }
  .chart-bar-fill.mid { background: #ffd966; }
  .chart-bar-fill.high { background: #ff5555; }

  .chart-cost {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .chart-stats {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .chart-stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 2px;
  }

  .chart-stat-label { color: rgba(255, 255, 255, 0.4); }
  .chart-stat-value { color: rgba(255, 255, 255, 0.7); font-weight: 600; }

  .model-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    font-size: 10px;
  }

  .model-emoji { width: 14px; text-align: center; flex-shrink: 0; }

  .model-name {
    width: 70px;
    color: rgba(255, 255, 255, 0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }

  .model-bar-bg {
    flex: 1;
    height: 10px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 3px;
    overflow: hidden;
    min-width: 0;
  }

  .model-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .model-bar-fill.color-claude { background: #b87fff; }
  .model-bar-fill.color-openai { background: #74aa9c; }
  .model-bar-fill.color-google { background: #4285f4; }
  .model-bar-fill.color-cursor { background: #06b6d4; }

  .model-cost {
    width: 42px;
    text-align: right;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
    flex-shrink: 0;
    font-size: 9px;
  }

  .model-pct {
    width: 28px;
    text-align: right;
    color: rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
    font-size: 9px;
  }

  .model-saving-tip {
    font-size: 9px;
    color: rgba(255, 200, 50, 0.7);
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ── Version / Update ── */
  .version-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .version-label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
  }

  .update-btn {
    font-size: 9px;
    padding: 3px 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    background: transparent;
    color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    transition: all 0.15s;
  }

  .update-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.8);
  }

  .update-btn.has-update {
    border-color: rgba(76, 175, 80, 0.5);
    color: rgba(76, 175, 80, 0.9);
    animation: pulse-update 2s infinite;
  }

  @keyframes pulse-update {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .update-btn.checking {
    opacity: 0.5;
    pointer-events: none;
  }

  .settings-footer {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 6px;
    font-size: 9px;
  }

  .settings-footer a {
    color: rgba(255, 255, 255, 0.3);
    text-decoration: none;
    transition: color 0.15s;
  }

  .settings-footer a:hover {
    color: rgba(255, 255, 255, 0.6);
  }

  .quit-btn {
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.3);
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .quit-btn:hover {
    color: rgba(255, 100, 100, 0.7);
    border-color: rgba(255, 100, 100, 0.3);
  }

  .daily-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 3px;
    font-size: 9px;
  }

  .daily-date {
    width: 48px;
    color: rgba(255, 255, 255, 0.4);
    flex-shrink: 0;
  }

  .daily-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 2px;
    overflow: hidden;
    min-width: 0;
  }

  .daily-cost {
    width: 40px;
    text-align: right;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
    flex-shrink: 0;
  }

  .daily-calls {
    width: 26px;
    text-align: right;
    color: rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="widget tier-peace" id="widget">
  <div class="toolbar">
    <div class="tool-btn" id="chartBtn" title="">📊</div>
    <div class="tool-btn" id="modelsBtn" title="">🏷️</div>
    <div class="tool-btn" id="topBtn" title="">🏆</div>
    <div class="tool-btn" id="gearBtn" title="">⚙</div>
  </div>

  <div class="main-row">
    <div class="emoji-container" id="emoji">🪙</div>
    <div class="info">
      <div class="cost-line">
        <span class="cost" id="cost">$0.00</span>
        <span class="delta" id="delta"></span>
      </div>
      <div class="equiv" id="equiv"></div>
      <div class="calls" id="calls"></div>
    </div>
  </div>

  <div class="budget-section" id="budgetSection">
    <div class="budget-bar-bg">
      <div class="budget-bar-fill" id="budgetFill"></div>
    </div>
    <div class="budget-label">
      <span id="budgetUsed">$0</span>
      <span id="budgetTotal">$0</span>
    </div>
  </div>

  <div class="nudge" id="nudge"></div>

  <!-- Chart Panel -->
  <div class="panel chart-panel" id="chartPanel">
    <div class="panel-divider"></div>
    <div class="chart-panel-title" id="chartTitle"></div>
    <div id="chartBody"></div>
  </div>

  <!-- Models Panel -->
  <div class="panel models-panel" id="modelsPanel">
    <div class="panel-divider"></div>
    <div class="chart-panel-title" id="modelsTitle"></div>
    <div id="modelsBody"></div>
  </div>

  <!-- TOP 3 Panel -->
  <div class="panel top-panel" id="topPanel">
    <div class="panel-divider"></div>
    <div class="top-panel-title" id="topTitle"></div>
    <div class="top-summary" id="topSummary"></div>
    <div id="topList"></div>
  </div>

  <!-- Settings Panel -->
  <div class="panel settings-panel" id="settingsPanel">
    <div class="panel-divider"></div>

    <div class="exchange-info" id="exchangeInfo" style="display:none">
      <span>💱 <span id="exchangeRateDisplay"></span></span>
      <span class="exchange-source" id="exchangeSource"></span>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lblCurrency"></span>
      <select class="setting-select" id="currencySelect" style="width:80px">
        <option value="USD">$ USD</option>
      </select>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lblBudget"></span>
      <input type="text" class="setting-input" id="budgetInput" placeholder="">
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lblEquiv"></span>
      <select class="setting-select" id="unitSelect">
        <option value="auto"></option>
      </select>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lblNudge"></span>
      <label class="toggle">
        <input type="checkbox" id="nudgeToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lblLang"></span>
      <select class="setting-select" id="langSelect" style="width:80px">
        <option value="en">English</option>
        <option value="ko">한국어</option>
      </select>
    </div>

    <button class="save-btn" id="saveBtn"></button>

    <div class="version-section" id="versionSection">
      <span class="version-label" id="versionLabel">v...</span>
      <button class="update-btn" id="updateBtn"></button>
    </div>

    <div class="settings-footer">
      <a href="https://buymeacoffee.com/shimsuyeon" target="_blank" id="footerCoffee">☕ Buy me a coffee</a>
      <span style="color: rgba(255,255,255,0.15)">·</span>
      <a href="https://github.com/Shimsuyeon" target="_blank" id="footerGithub">GitHub @Shimsuyeon</a>
    </div>
    <div style="text-align: center;">
      <button class="quit-btn" id="quitBtn">Quit</button>
    </div>
  </div>
</div>

<script>
  const widget = document.getElementById('widget');
  const emojiEl = document.getElementById('emoji');
  const costEl = document.getElementById('cost');
  const deltaEl = document.getElementById('delta');
  const equivEl = document.getElementById('equiv');
  const callsEl = document.getElementById('calls');
  const budgetSection = document.getElementById('budgetSection');
  const budgetFill = document.getElementById('budgetFill');
  const budgetUsed = document.getElementById('budgetUsed');
  const budgetTotal = document.getElementById('budgetTotal');
  const nudgeEl = document.getElementById('nudge');
  const gearBtn = document.getElementById('gearBtn');
  const topBtn = document.getElementById('topBtn');
  const chartBtn = document.getElementById('chartBtn');
  const modelsBtn = document.getElementById('modelsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const topPanel = document.getElementById('topPanel');
  const chartPanel = document.getElementById('chartPanel');
  const modelsPanel = document.getElementById('modelsPanel');
  const chartBody = document.getElementById('chartBody');
  const modelsBody = document.getElementById('modelsBody');
  const topList = document.getElementById('topList');
  const topSummary = document.getElementById('topSummary');
  const budgetInput = document.getElementById('budgetInput');
  const unitSelect = document.getElementById('unitSelect');
  const currencySelect = document.getElementById('currencySelect');
  const nudgeToggle = document.getElementById('nudgeToggle');
  const saveBtn = document.getElementById('saveBtn');
  const exchangeInfoEl = document.getElementById('exchangeInfo');
  const exchangeRateDisplay = document.getElementById('exchangeRateDisplay');
  const exchangeSource = document.getElementById('exchangeSource');
  const langSelect = document.getElementById('langSelect');

  const versionLabel = document.getElementById('versionLabel');
  const updateBtn = document.getElementById('updateBtn');

  let activePanel = null;
  let latestData = {};
  let currentExchange = null;
  let L = {};

  function loc(key, params) {
    let text = (key in L) ? L[key] : key;
    if (params) {
      for (const [k, v] of Object.entries(params)) {
        text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), String(v));
      }
    }
    return text;
  }

  function applyStaticLabels() {
    chartBtn.title = loc('tooltip.chart');
    modelsBtn.title = loc('tooltip.models');
    topBtn.title = loc('tooltip.top');
    gearBtn.title = loc('tooltip.settings');

    document.getElementById('chartTitle').textContent = loc('overlay.chartTitle');
    document.getElementById('modelsTitle').textContent = loc('overlay.modelsTitle');
    document.getElementById('topTitle').textContent = loc('overlay.topTitle');

    document.getElementById('lblCurrency').textContent = loc('settings.currency');
    document.getElementById('lblBudget').textContent = loc('settings.dailyBudget');
    budgetInput.placeholder = loc('settings.budgetPlaceholder');
    document.getElementById('lblEquiv').textContent = loc('settings.equivUnit');
    document.getElementById('lblNudge').textContent = loc('settings.nudge');
    document.getElementById('lblLang').textContent = loc('settings.language');
    saveBtn.textContent = loc('settings.save');
    updateBtn.textContent = loc('settings.checkUpdate');
    document.getElementById('quitBtn').textContent = loc('settings.quit');

    const autoOpt = unitSelect.querySelector('option[value="auto"]');
    if (autoOpt) autoOpt.textContent = loc('settings.autoUnit');

    equivEl.textContent = loc('overlay.walletPeace');
  }

  function formatTokens(n) {
    if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
    if (n >= 1_000) return `${(n / 1_000).toFixed(1)}K`;
    return String(n);
  }

  function formatCostUsd(cost) {
    if (cost < 0.01) return `$${cost.toFixed(4)}`;
    if (cost < 1) return `$${cost.toFixed(3)}`;
    return `$${cost.toFixed(2)}`;
  }

  function formatCost(cost) {
    const ex = currentExchange;
    if (!ex || ex.currency === 'USD') return formatCostUsd(cost);

    const local = cost * ex.rate;
    const sym = ex.symbol;

    if (ex.currency === 'KRW' || ex.currency === 'JPY') {
      return `${sym}${Math.round(local).toLocaleString()}`;
    }
    return `${sym}${local.toFixed(2)}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Panel toggle ──

  function closeAllPanels() {
    settingsPanel.classList.remove('open');
    topPanel.classList.remove('open');
    chartPanel.classList.remove('open');
    modelsPanel.classList.remove('open');
    gearBtn.classList.remove('active');
    topBtn.classList.remove('active');
    chartBtn.classList.remove('active');
    modelsBtn.classList.remove('active');
    activePanel = null;
    window.bridge.resizeWidget(false);
  }

  function openPanel(name) {
    closeAllPanels();
    activePanel = name;

    if (name === 'settings') {
      settingsPanel.classList.add('open');
      gearBtn.classList.add('active');
    } else if (name === 'top') {
      topPanel.classList.add('open');
      topBtn.classList.add('active');
      renderTopList();
    } else if (name === 'chart') {
      chartPanel.classList.add('open');
      chartBtn.classList.add('active');
      loadChart();
    } else if (name === 'models') {
      modelsPanel.classList.add('open');
      modelsBtn.classList.add('active');
      loadModels();
    }

    window.bridge.resizeWidget(true);
  }

  gearBtn.addEventListener('click', async () => {
    if (activePanel === 'settings') {
      closeAllPanels();
      return;
    }
    const cfg = await window.bridge.getConfig();
    budgetInput.value = cfg.dailyBudget || '';
    nudgeToggle.checked = cfg.showNudge !== false;
    langSelect.value = cfg.language || 'en';

    unitSelect.innerHTML = `<option value="auto">${loc('settings.autoUnit')}</option>`;
    if (cfg.allUnits) {
      for (const u of cfg.allUnits) {
        const opt = document.createElement('option');
        opt.value = u.key || u.name;
        opt.textContent = `${u.emoji} ${u.name}`;
        unitSelect.appendChild(opt);
      }
    }
    unitSelect.value = cfg.equivalentUnit || 'auto';

    const CURRENCY_LABELS = { USD: '$ USD', KRW: '₩ KRW', JPY: '¥ JPY', EUR: '€ EUR', GBP: '£ GBP', CNY: '¥ CNY' };
    currencySelect.innerHTML = '';
    const currencies = cfg.supportedCurrencies || ['USD'];
    for (const c of currencies) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = CURRENCY_LABELS[c] || c;
      currencySelect.appendChild(opt);
    }
    currencySelect.value = cfg.currency || 'USD';

    if (cfg.currentExchange && cfg.currentExchange.currency !== 'USD') {
      exchangeInfoEl.style.display = 'flex';
      exchangeRateDisplay.textContent = `1 USD = ${cfg.currentExchange.rate.toLocaleString()} ${cfg.currentExchange.currency}`;
      const srcMap = {
        api: loc('overlay.exchange.api'), cache: loc('overlay.exchange.cache'),
        'stale-cache': loc('overlay.exchange.staleCache'), manual: loc('overlay.exchange.manual')
      };
      exchangeSource.textContent = `${srcMap[cfg.currentExchange.source] || ''} ${cfg.currentExchange.updatedAt || ''}`.trim();
    } else {
      exchangeInfoEl.style.display = 'none';
    }

    saveBtn.textContent = loc('settings.save');
    saveBtn.classList.remove('saved');

    window.bridge.checkUpdate().then(info => {
      versionLabel.textContent = `v${info.current}`;
      if (info.updateAvailable) {
        updateBtn.textContent = loc('settings.updateAvailable', { version: info.latest });
        updateBtn.classList.add('has-update');
      } else {
        updateBtn.textContent = loc('settings.latestVersion');
        updateBtn.classList.remove('has-update');
      }
    }).catch(() => {
      versionLabel.textContent = 'v?';
    });

    openPanel('settings');
  });

  chartBtn.addEventListener('click', () => {
    if (activePanel === 'chart') {
      closeAllPanels();
      return;
    }
    openPanel('chart');
  });

  modelsBtn.addEventListener('click', () => {
    if (activePanel === 'models') {
      closeAllPanels();
      return;
    }
    openPanel('models');
  });

  topBtn.addEventListener('click', () => {
    if (activePanel === 'top') {
      closeAllPanels();
      return;
    }
    openPanel('top');
  });

  // ── TOP 3 rendering ──

  function renderTopList() {
    const items = latestData.topRequests || [];
    const count = latestData.callCount || 0;
    const total = latestData.totalCost || 0;

    if (count > 0) {
      const avg = total / count;
      topSummary.innerHTML = loc('overlay.topSummary', { count, avg: formatCost(avg) });
    } else {
      topSummary.innerHTML = '';
    }

    if (items.length === 0) {
      topList.innerHTML = `<div class="top-empty">${loc('overlay.noRequests')}</div>`;
      return;
    }

    const medals = ['🥇', '🥈', '🥉'];
    topList.innerHTML = items.map((req, i) => {
      const modelKey = req.model.toLowerCase();
      const isCursor = req.provider === 'cursor';
      const modelClass = isCursor ? 'cursor'
        : /opus/i.test(modelKey) ? 'opus' : /haiku/i.test(modelKey) ? 'haiku'
        : /gpt|o[1-4]/i.test(modelKey) ? 'openai' : /gemini/i.test(modelKey) ? 'google' : 'sonnet';
      const pEmoji = req.providerEmoji ? `<span style="font-size:10px">${req.providerEmoji}</span> ` : '';
      const hasFullPrompt = req.fullPrompt && req.fullPrompt.length > 30;
      const promptHtml = req.prompt
        ? `<div class="top-prompt" data-idx="${i}" ${hasFullPrompt ? `title="${loc('overlay.clickToExpand')}"` : ''}>💬 ${escapeHtml(req.prompt)}</div>`
        : '';

      const inCost = req.inputCost || 0;
      const outCost = req.outputCost || 0;
      const total = inCost + outCost;
      const inPct = total > 0 ? Math.round((inCost / total) * 100) : 0;
      const outPct = total > 0 ? 100 - inPct : 0;

      let detailHtml = '';
      if (total > 0) {
        detailHtml = `
          <div class="cost-split">
            <span class="split-label label-in">↓ ${loc('overlay.costInput')}</span>
            <span class="split-value val-in">${formatCost(inCost)}</span>
            <span class="split-pct">(${inPct}%)</span>
            <span class="split-label label-out" style="margin-left:4px">↑ ${loc('overlay.costOutput')}</span>
            <span class="split-value val-out">${formatCost(outCost)}</span>
            <span class="split-pct">(${outPct}%)</span>
          </div>
        `;
      } else {
        const tokIn = req.inputTokens || 0;
        const tokOut = req.outputTokens || 0;
        detailHtml = (tokIn || tokOut)
          ? `<div class="top-tokens"><span class="tok-in">↓ ${formatTokens(tokIn)}</span><span class="tok-out">↑ ${formatTokens(tokOut)}</span></div>`
          : '';
      }

      return `
        <div class="top-item">
          <span class="top-medal">${medals[i]}</span>
          <span class="top-cost">${formatCost(req.cost)}</span>
          <span class="top-model ${modelClass}">${pEmoji}${req.model}</span>
          <span class="top-time">${req.time || ''}</span>
        </div>
        ${promptHtml}
        ${detailHtml}
      `;
    }).join('');

    topList.querySelectorAll('.top-prompt[data-idx]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        const req = items[idx];
        if (!req?.fullPrompt) return;
        const isExpanded = el.classList.toggle('expanded');
        el.textContent = isExpanded ? `💬 ${req.fullPrompt}` : `💬 ${req.prompt}`;
      });
    });
  }

  // ── Chart ──

  async function loadChart(preloaded) {
    if (!preloaded) chartBody.innerHTML = `<div class="top-empty">${loc('overlay.loading')}</div>`;
    const report = preloaded || await window.bridge.getReport(7);
    const days = report.dailyData || [];

    if (days.length === 0) {
      chartBody.innerHTML = `<div class="top-empty">${loc('overlay.noData')}</div>`;
      return;
    }

    const callsSuffix = loc('overlay.callsSuffix');
    const maxCost = Math.max(...days.map(d => d.cost), 0.01);

    let html = days.slice(-7).reverse().map(d => {
      const pct = Math.round((d.cost / maxCost) * 100);
      const barClass = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
      return `
        <div class="daily-row">
          <span class="daily-date">${d.date} ${d.day}</span>
          <div class="daily-bar-bg">
            <div class="chart-bar-fill ${barClass}" style="width:${pct}%"></div>
          </div>
          <span class="daily-cost">${d.cost > 0 ? formatCost(d.cost) : '·'}</span>
          <span class="daily-calls">${d.calls || 0}${callsSuffix}</span>
        </div>
      `;
    }).join('');

    if (report.stats) {
      html += `
        <div class="chart-stats">
          <div class="chart-stat-row">
            <span class="chart-stat-label">${loc('overlay.totalCost')}</span>
            <span class="chart-stat-value">${formatCost(report.stats.totalCost)}</span>
          </div>
          <div class="chart-stat-row">
            <span class="chart-stat-label">${loc('overlay.dailyAvg')}</span>
            <span class="chart-stat-value">${formatCost(report.stats.avgDaily)}</span>
          </div>
          <div class="chart-stat-row">
            <span class="chart-stat-label">${loc('overlay.totalCalls')}</span>
            <span class="chart-stat-value">${report.stats.totalCalls}${callsSuffix}</span>
          </div>
        </div>
      `;
    }

    chartBody.innerHTML = html;
  }

  // ── Models ──

  async function loadModels(preloaded) {
    if (!preloaded) modelsBody.innerHTML = `<div class="top-empty">${loc('overlay.loading')}</div>`;
    const report = preloaded || await window.bridge.getReport(7);
    const models = report.modelSummary || [];

    if (models.length === 0) {
      modelsBody.innerHTML = `<div class="top-empty">${loc('overlay.noData')}</div>`;
      return;
    }

    const maxCost = models[0]?.cost || 0.01;
    const COLORS = { claude: 'color-claude', openai: 'color-openai', google: 'color-google', cursor: 'color-cursor' };

    let html = models.map(m => {
      const pct = Math.round((m.cost / maxCost) * 100);
      const colorClass = COLORS[m.provider] || 'color-claude';
      return `
        <div class="model-row">
          <span class="model-emoji">${m.emoji || ''}</span>
          <span class="model-name">${m.model}</span>
          <div class="model-bar-bg">
            <div class="model-bar-fill ${colorClass}" style="width:${pct}%"></div>
          </div>
          <span class="model-cost">${formatCost(m.cost)}</span>
          <span class="model-pct">${m.pct}%</span>
        </div>
      `;
    }).join('');

    const savings = report.savingsSimulation || [];
    if (savings.length > 0) {
      html += '<div class="model-saving-tip">';
      for (const s of savings.slice(0, 2)) {
        html += `${loc('overlay.savingHint', { from: s.from, to: s.to, saving: formatCost(s.saving) })}<br>`;
      }
      html += '</div>';
    }

    modelsBody.innerHTML = html;
  }

  // ── SWR: background refresh ──

  window.bridge.onReportRefreshed(({ data }) => {
    if (activePanel === 'chart') loadChart(data);
    if (activePanel === 'models') loadModels(data);
  });

  // ── Quit button ──

  document.getElementById('quitBtn').addEventListener('click', () => {
    window.bridge.quitApp();
  });

  // ── Update check ──

  updateBtn.addEventListener('click', async () => {
    if (updateBtn.classList.contains('has-update')) {
      updateBtn.textContent = loc('settings.updating');
      updateBtn.classList.remove('has-update');
      updateBtn.classList.add('checking');
      try {
        const result = await window.bridge.runUpdate();
        if (result.success) {
          updateBtn.textContent = loc('settings.updateDone');
          updateBtn.classList.remove('checking');
        } else {
          updateBtn.textContent = loc('settings.updateFailed');
          updateBtn.classList.remove('checking');
          setTimeout(() => { updateBtn.textContent = loc('settings.checkUpdate'); }, 3000);
        }
      } catch {
        updateBtn.textContent = loc('settings.updateFailed');
        updateBtn.classList.remove('checking');
        setTimeout(() => { updateBtn.textContent = loc('settings.checkUpdate'); }, 3000);
      }
      return;
    }

    updateBtn.classList.add('checking');
    updateBtn.textContent = loc('settings.checking');

    try {
      const info = await window.bridge.checkUpdate();
      versionLabel.textContent = `v${info.current}`;

      if (info.updateAvailable) {
        updateBtn.textContent = loc('settings.updateAvailable', { version: info.latest });
        updateBtn.classList.remove('checking');
        updateBtn.classList.add('has-update');
      } else {
        updateBtn.textContent = loc('settings.latestVersion');
        updateBtn.classList.remove('checking', 'has-update');
        setTimeout(() => { updateBtn.textContent = loc('settings.checkUpdate'); }, 2000);
      }
    } catch {
      updateBtn.textContent = loc('settings.checkFailed');
      updateBtn.classList.remove('checking');
      setTimeout(() => { updateBtn.textContent = loc('settings.checkUpdate'); }, 2000);
    }
  });

  // ── Instant language switch ──

  langSelect.addEventListener('change', async () => {
    const newLang = langSelect.value;
    await window.bridge.saveConfig({ language: newLang });

    const cfg = await window.bridge.getConfig();
    if (cfg.allUnits) {
      const prevKey = unitSelect.value;
      unitSelect.innerHTML = `<option value="auto">${loc('settings.autoUnit')}</option>`;
      for (const u of cfg.allUnits) {
        const opt = document.createElement('option');
        opt.value = u.key || u.name;
        opt.textContent = `${u.emoji} ${u.name}`;
        unitSelect.appendChild(opt);
      }
      unitSelect.value = prevKey;
    }
  });

  // ── Settings save ──

  saveBtn.addEventListener('click', async () => {
    const budgetVal = budgetInput.value.trim();
    const updates = {
      dailyBudget: budgetVal === '' ? null : parseFloat(budgetVal),
      showNudge: nudgeToggle.checked,
      equivalentUnit: unitSelect.value,
      currency: currencySelect.value,
      language: langSelect.value,
    };

    if (updates.dailyBudget !== null && isNaN(updates.dailyBudget)) {
      budgetInput.style.borderColor = 'rgba(255, 80, 80, 0.6)';
      setTimeout(() => { budgetInput.style.borderColor = ''; }, 1500);
      return;
    }

    await window.bridge.saveConfig(updates);

    saveBtn.textContent = loc('settings.saved');
    saveBtn.classList.add('saved');
    setTimeout(() => {
      saveBtn.textContent = loc('settings.save');
      saveBtn.classList.remove('saved');
    }, 1500);
  });

  // ── Display ──

  function updateDisplay(data) {
    latestData = data;
    if (data.exchange) currentExchange = data.exchange;

    if (data.locale && data.locale !== L) {
      L = data.locale;
      applyStaticLabels();
    }

    widget.className = 'widget';
    if (data.tier) widget.classList.add(`tier-${data.tier.level}`);

    if (activePanel === 'settings') gearBtn.classList.add('active');
    if (activePanel === 'top') topBtn.classList.add('active');
    if (activePanel === 'chart') chartBtn.classList.add('active');
    if (activePanel === 'models') modelsBtn.classList.add('active');

    if (data.tier) emojiEl.textContent = data.tier.emoji;
    costEl.textContent = formatCost(data.totalCost);

    const defaultUnit = loc('display.defaultUnit');
    if (data.equivalent) {
      equivEl.textContent = `${data.equivalent.emoji} ${data.equivalent.name} ${data.equivalent.count}${data.equivalent.unit || defaultUnit}`;
    } else if (data.totalCost === 0) {
      equivEl.textContent = loc('overlay.walletPeace');
    } else {
      equivEl.textContent = loc('overlay.stillOk');
    }

    if (data.callCount > 0) {
      const providerBreakdown = data.costByProvider && Object.keys(data.costByProvider).length > 1
        ? ' (' + Object.entries(data.costByProvider)
            .sort((a, b) => b[1] - a[1])
            .map(([p, c]) => {
              const meta = { claude: '🟣', openai: '🟢', google: '🔵', cursor: '⚡' };
              return `${meta[p] || ''}${formatCost(c)}`;
            }).join(' ') + ')'
        : '';
      callsEl.textContent = loc('overlay.todayCalls', { count: data.callCount }) + providerBreakdown;
    }

    if (data.budget) {
      budgetSection.classList.add('visible');
      const pct = Math.round(data.budget.ratio * 100);
      budgetFill.style.width = `${pct}%`;
      budgetFill.className = 'budget-bar-fill';
      if (data.budget.status === 'exceeded') budgetFill.classList.add('exceeded');
      else if (data.budget.status === 'danger') budgetFill.classList.add('danger');
      else if (data.budget.status === 'warning') budgetFill.classList.add('warning');
      budgetUsed.textContent = formatCost(data.totalCost);
      budgetTotal.textContent = formatCost(data.budget.budget);
    } else {
      budgetSection.classList.remove('visible');
    }

    if (activePanel === 'top') renderTopList();
  }

  function animateUpdate(data) {
    emojiEl.classList.remove('bounce');
    void emojiEl.offsetWidth;
    emojiEl.classList.add('bounce');

    widget.classList.remove('pulse');
    void widget.offsetWidth;
    widget.classList.add('pulse');

    if (data.tier && ['alert', 'danger', 'funeral'].includes(data.tier.level)) {
      widget.classList.remove('shake');
      void widget.offsetWidth;
      widget.classList.add('shake');
    }

    if (data.deltaCost) {
      deltaEl.textContent = `+${formatCost(data.deltaCost)}`;
      deltaEl.classList.remove('show');
      void deltaEl.offsetWidth;
      deltaEl.classList.add('show');
    }

    if (data.nudge) {
      nudgeEl.textContent = loc('overlay.nudge', { model: data.nudge.model, saving: formatCost(data.nudge.saving) });
      nudgeEl.classList.remove('show');
      void nudgeEl.offsetWidth;
      nudgeEl.classList.add('show');
    }
  }

  window.bridge.onInitialData((data) => updateDisplay(data));
  window.bridge.onCostUpdate((data) => {
    updateDisplay(data);
    animateUpdate(data);
  });
</script>

</body>
</html>

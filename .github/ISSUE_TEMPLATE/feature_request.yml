name: "Feature Request (기능 제안)"
description: "Suggest an idea for this project (새로운 기능을 제안해주세요)"
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: "What would you like? (어떤 기능을 원하시나요?)"
      description: "Describe the feature you'd like to see. (원하는 기능을 설명해주세요.)"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "Use case (사용 시나리오)"
      description: "When would you use this feature? (이 기능을 언제 사용하게 될까요?)"
      placeholder: "e.g. When I want to track costs across multiple projects..."
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: "Scope (적용 범위)"
      options:
        - Overlay (Electron GUI)
        - CLI
        - Both (둘 다)
        - Other (기타)
    validations:
      required: false
